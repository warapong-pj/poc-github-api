name: Example Workflow

on:
  workflow_dispatch:
    inputs:
      jira-key:
        description: 'Jira key'
        required: true
        type: string
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
          - prd
      service:
        description: 'Service name'
        required: true
        type: string
      tag:
        description: 'Deployment tag'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print inputs
        run: |
          #!/bin/sh

          set -e

          echo ${{ inputs.jira-key }}
          echo ${{ inputs.environment }}
          echo ${{ inputs.service }}
          echo ${{ inputs.tag }}

          cat <<EOF >> request.json
          {
            "body": {
              "content": [
                {
                  "content": [
                    {
                      "text": "comment from GitHub Actions",
                      "type": "text"
                    }
                  ],
                  "type": "paragraph"
                }
              ],
              "type": "doc",
              "version": 1
            }
          }
          EOF

          curl --request POST \
            --url 'https://top-cat6.atlassian.net/rest/api/3/issue/${{ inputs.jira-key }}/comment' \
            --user 'warapong.pj@gmail.com:${{ secrets.JIRA_TOKEN }}' \
            --header 'Accept: application/json' \
            --header 'Content-Type: application/json' \
            --data @request.json
